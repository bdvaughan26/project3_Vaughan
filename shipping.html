<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shipping Information</title>
    <link rel="stylesheet" href="css/cart.css" />
    <script src="scripts/common.js"></script>
    <script src="scripts/shipping.js"></script>
    <link rel="stylesheet" href="css/mapstyles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  </head>
  <body onload="initShippingPage()">
    <header>
      <nav class="site-nav">
        <ul>
          <li><a href="index.html">HOME</a></li>
          <li><a href="portfolio.html">PORTFOLIO</a></li>
          <li><a href="services.html">SERVICES</a></li>
          <li><a href="contact.html">CONTACT</a></li>
          <li><a class="nav-button" href="shop.html">STOREFRONT</a></li>
          <li><a class="nav-button" href="cart.html">BACK TO CART</a></li>
        </ul>
      </nav>
    </header>
    <main class="container shipping-layout">
      <section class="shipping-card">
        <h2>Shipping Information</h2>
        
        <form id="shipping-form">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" />

          <label for="address">Street Address</label>
          <input type="text" id="address" />

          <label for="city">City</label>
          <input type="text" id="city" />

          <label for="state">State</label>
          <input type="text" id="state" />

          <label for="zipCode">Zip Code</label>
          <input type="text" id="zipCode" />

          <label for="notes">Delivery Notes</label>
          <textarea id="notes" rows="4"></textarea>

          <label class="checkbox-label">
          <input type="checkbox" id="sameAsBilling" />
          Same as billing
        </label>

          <div id="billingInformation">
            <label for="billingFullName">Billing Full Name</label>
            <input type="text" id="billingFullName" />

            <label for="billingAddress">Billing Street Address</label>
            <input type="text" id="billingAddress" />

            <label for="billingCity">Billing City</label>
            <input type="text" id="billingCity" />

            <label for="billingState">Billing State</label>
            <input type="text" id="billingState" />

            <label for="billingZipCode">Billing Zip Code</label>
            <input type="text" id="billingZipCode" />
          </div>
          <br>

          <button type="submit" class="action-button primary-button">
            Place Simulated Order
          </button>
        </form>

        <div id="shipping-message"></div>
      </section>

      <section class="summary-card">
        <h2>Order Summary</h2>
        <div id="shipping-summary"></div>
      </section>
    </main>
    <footer>
      <div class="footer-column">
        <h4 style="padding: 0em">I WOULD LOVE TO HEAR FEEDBACK:</h4>
        <br />
        <a href="https://forms.gle/wGAimHQj5CntJ2KG7" target="_blank"
          >Google Form</a
        ><br /><br />
        <h4 style="padding: 0em">EMAIL:</h4>
        <br />
        <a href="mailto:bdstubbs@amarillocollege.com">Bailey Vaughan</a>
      </div>
      <div class="footer-column">
        <img
          id="footer-image"
          src="images/favicon.jpg"
          alt="Bailey's Portfolio Logo"
        />
      </div>
      <div class="footer-column">
        <div id="map" class="footer-map"></div>
      </div>
    </footer>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="scripts/mapscript.js"></script>
  </body>
</html>
